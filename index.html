<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Point Break</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a1628; overflow:hidden; width:100vw; height:100vh; font-family: Georgia, serif; }
  #rotate {
    display:none; position:fixed; inset:0; background:#0a1628; color:#fff;
    font-size:22px; line-height:2.2; justify-content:center; align-items:center;
    text-align:center; z-index:99; padding:30px;
  }
  #menu {
    position:fixed; inset:0; display:flex; flex-direction:column;
    justify-content:center; align-items:center; z-index:10; transition: opacity 1.5s ease;
    background: linear-gradient(180deg, rgba(10,22,40,0.3) 0%, rgba(10,22,40,0.7) 100%);
  }
  #menu h1 { font-size:64px; font-weight:bold; color:#fff; letter-spacing:8px;
    text-shadow: 0 0 60px rgba(0,180,255,0.6), 0 2px 4px rgba(0,0,0,0.8); }
  #menu .sub { font-size:18px; color:rgba(200,230,255,0.7); margin-top:12px; letter-spacing:4px; }
  #menu .tap { font-size:16px; color:rgba(255,255,255,0.5); margin-top:48px; letter-spacing:2px;
    animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.9} }
  #hud { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between;
    align-items:flex-start; padding:24px 32px; pointer-events:none; z-index:5;
    opacity:0; transition: opacity 1s; }
  #hud.visible { opacity:1; }
  .hud-score { font-size:32px; color:rgba(255,255,255,0.9);
    text-shadow: 0 0 20px rgba(0,200,255,0.5); letter-spacing:2px; }
  .hud-time { font-size:16px; color:rgba(255,255,255,0.5); letter-spacing:3px; margin-top:6px; }
  #hint { position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
    font-size:14px; color:rgba(255,255,255,0.4); pointer-events:none; z-index:10;
    letter-spacing:3px; animation: pulse 2.5s ease-in-out infinite;
    transition: opacity 2s; white-space:nowrap; }
  @media (orientation:portrait) {
    #rotate { display:flex !important; }
    canvas, #menu, #hint, #hud { display:none !important; }
  }
</style>
</head>
<body>
<div id="rotate">🏄‍♂️ POINT BREAK<br><span style="font-size:16px;opacity:0.7">rotate to landscape to surf</span></div>
<div id="menu">
  <h1>POINT BREAK</h1>
  <div class="sub">a surfing journey</div>
  <div class="tap">tap to drop in</div>
</div>
<div id="hud">
  <div>
    <div class="hud-score" id="score">0</div>
    <div class="hud-time" id="timer">0:00</div>
  </div>
</div>
<div id="hint">drag to carve &nbsp;·&nbsp; tilt to lean</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { Sky } from 'three/addons/objects/Sky.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 80, 300);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 3.5, 12);
camera.lookAt(0, 1, -20);

// Sky
const sky = new Sky();
sky.scale.setScalar(1000);
scene.add(sky);
const skyU = sky.material.uniforms;
skyU['turbidity'].value = 4;
skyU['rayleigh'].value = 1.5;
skyU['mieCoefficient'].value = 0.003;
skyU['mieDirectionalG'].value = 0.92;
const sun = new THREE.Vector3();
sun.setFromSphericalCoords(1, THREE.MathUtils.degToRad(82), THREE.MathUtils.degToRad(160));
skyU['sunPosition'].value.copy(sun);

// Ocean
const oceanGeo = new THREE.PlaneGeometry(400, 600, 80, 120);
oceanGeo.rotateX(-Math.PI/2);
const oceanBase = new Float32Array(oceanGeo.attributes.position.array);
const oceanMat = new THREE.MeshPhongMaterial({ color:0x0077aa, specular:0x88ddff, shininess:120, transparent:true, opacity:0.92 });
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.position.set(0, 0, -100);
scene.add(ocean);

// Wave face — the hero
const waveGeo = new THREE.PlaneGeometry(50, 200, 60, 80);
const wArr = waveGeo.attributes.position.array;
for (let i=0; i<wArr.length; i+=3) {
  const nx = (wArr[i] + 25) / 50;
  let h;
  if (nx < 0.3)      h = nx * 4;
  else if (nx < 0.7) h = 1.2 + (nx-0.3)*6;
  else               h = 3.6 + Math.pow((nx-0.7)*3,2)*4;
  wArr[i+1] = h * 6;
}
waveGeo.computeVertexNormals();
waveGeo.rotateX(-Math.PI/2);
const waveBase = new Float32Array(waveGeo.attributes.position.array);

const waveMat = new THREE.MeshPhongMaterial({ color:0x0099cc, specular:0xaaeeff, shininess:180, transparent:true, opacity:0.85, side:THREE.DoubleSide });
const waveMesh = new THREE.Mesh(waveGeo, waveMat);
waveMesh.position.set(-20, 0, -60);
scene.add(waveMesh);

// Lip foam bar
const lipGeo = new THREE.PlaneGeometry(5, 200, 1, 1);
const lipMat = new THREE.MeshPhongMaterial({ color:0xffffff, transparent:true, opacity:0.75, side:THREE.DoubleSide });
const lipMesh = new THREE.Mesh(lipGeo, lipMat);
lipMesh.rotation.x = -Math.PI/2;
lipMesh.position.set(-29, 22, -60);
scene.add(lipMesh);

// Spray
const sprayCount = 200;
const sprayGeo = new THREE.BufferGeometry();
const sprayPos = new Float32Array(sprayCount*3);
const sprayVel = new Float32Array(sprayCount*3);
const sprayLife = new Float32Array(sprayCount);
function resetSpray(i) {
  sprayPos[i*3]   = -28 + (Math.random()-0.5)*4;
  sprayPos[i*3+1] = 20  + Math.random()*4;
  sprayPos[i*3+2] = -20 + Math.random()*-100;
  sprayVel[i*3]   = 0.05 + Math.random()*0.07;
  sprayVel[i*3+1] = Math.random()*0.04 - 0.01;
  sprayVel[i*3+2] = (Math.random()-0.5)*0.05;
  sprayLife[i]    = Math.random();
}
for (let i=0; i<sprayCount; i++) resetSpray(i);
sprayGeo.setAttribute('position', new THREE.BufferAttribute(sprayPos,3));
const sprayMat = new THREE.PointsMaterial({ color:0xffffff, size:0.15, transparent:true, opacity:0.6, sizeAttenuation:true, depthWrite:false });
scene.add(new THREE.Points(sprayGeo, sprayMat));

// Foam trail
const foamCount = 100;
const foamGeo = new THREE.BufferGeometry();
const foamPos = new Float32Array(foamCount*3);
const foamVel = new Float32Array(foamCount*3);
const foamLife = new Float32Array(foamCount);
function resetFoam(i, sx) {
  foamPos[i*3]   = sx + (Math.random()-0.5)*0.7;
  foamPos[i*3+1] = 0.05;
  foamPos[i*3+2] = 0.5 + Math.random()*0.3;
  foamVel[i*3]   = (Math.random()-0.5)*0.03;
  foamVel[i*3+1] = 0;
  foamVel[i*3+2] = 0.06 + Math.random()*0.05;
  foamLife[i]    = 0.7 + Math.random()*0.3;
}
for (let i=0; i<foamCount; i++) resetFoam(i,0);
foamGeo.setAttribute('position', new THREE.BufferAttribute(foamPos,3));
const foamMat = new THREE.PointsMaterial({ color:0xddf4ff, size:0.2, transparent:true, opacity:0.65, sizeAttenuation:true, depthWrite:false });
scene.add(new THREE.Points(foamGeo, foamMat));

// Surfer
const surferGroup = new THREE.Group();
const dark = new THREE.MeshPhongMaterial({ color:0x1a2535, shininess:20 });
const skin = new THREE.MeshPhongMaterial({ color:0xd4956a, shininess:10 });
const boardM = new THREE.MeshPhongMaterial({ color:0xf0e8d8, specular:0x888888, shininess:80 });

const board = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.055, 2.1), boardM);
surferGroup.add(board);

const legL = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.28,0.15), dark);
legL.position.set(-0.1, 0.2, 0.25); legL.rotation.x=0.15;
surferGroup.add(legL);

const legR = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.28,0.15), dark);
legR.position.set(0.1, 0.2, -0.15); legR.rotation.x=-0.1;
surferGroup.add(legR);

const torso = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.36,0.2), dark);
torso.position.set(0, 0.52, 0.05); torso.rotation.x=0.22;
surferGroup.add(torso);

const headM = new THREE.Mesh(new THREE.SphereGeometry(0.115,8,8), skin);
headM.position.set(0, 0.84, -0.02);
surferGroup.add(headM);

const arms = new THREE.Mesh(new THREE.BoxGeometry(0.38,0.08,0.1), dark);
arms.position.set(0, 0.58, 0.08);
surferGroup.add(arms);

surferGroup.rotation.y = Math.PI;
scene.add(surferGroup);

// Lights
scene.add(new THREE.AmbientLight(0x88aacc, 0.8));
const sunLight = new THREE.DirectionalLight(0xfff4e0, 2.0);
sunLight.position.set(80, 120, 40);
scene.add(sunLight);
const rimLight = new THREE.PointLight(0x00aaff, 1.5, 60);
rimLight.position.set(-15, 8, -10);
scene.add(rimLight);

// Input
let started=false, leanTarget=0, leanSmooth=0, touchStartX=null;
const menuEl=document.getElementById('menu');
const hudEl=document.getElementById('hud');
const hintEl=document.getElementById('hint');
const scoreEl=document.getElementById('score');
const timerEl=document.getElementById('timer');

function startGame() {
  if (started) return; started=true;
  menuEl.style.opacity='0';
  setTimeout(()=>{ menuEl.style.display='none'; hudEl.classList.add('visible'); }, 1200);
}

renderer.domElement.addEventListener('touchstart', e=>{ touchStartX=e.touches[0].clientX; startGame(); },{passive:true});
renderer.domElement.addEventListener('touchmove', e=>{ if(touchStartX===null)return; leanTarget=Math.max(-1,Math.min(1,(e.touches[0].clientX-touchStartX)/120)); },{passive:true});
renderer.domElement.addEventListener('touchend', ()=>{ touchStartX=null; leanTarget=0; });
renderer.domElement.addEventListener('mousedown', e=>{ touchStartX=e.clientX; startGame(); });
renderer.domElement.addEventListener('mousemove', e=>{ if(touchStartX===null)return; leanTarget=Math.max(-1,Math.min(1,(e.clientX-window.innerWidth/2)/(window.innerWidth/3))); });
renderer.domElement.addEventListener('mouseup', ()=>{ touchStartX=null; leanTarget=0; });
window.addEventListener('deviceorientation', e=>{ if(!started||e.gamma===null)return; leanTarget=Math.max(-1,Math.min(1,e.gamma/25)); });
window.addEventListener('resize', ()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });

// Game state
let elapsed=0, score=0, last=performance.now(), hintFaded=false;
let surferFaceY=3.5, surferFaceVY=0, waveSpeed=18;

function animate() {
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min((now-last)/1000, 0.05);
  last=now;

  if (!started) { renderer.render(scene,camera); return; }

  elapsed+=dt;
  score += dt*10 + Math.abs(leanSmooth)*dt*30;
  scoreEl.textContent = Math.floor(score);
  timerEl.textContent = Math.floor(elapsed/60)+':'+Math.floor(elapsed%60).toString().padStart(2,'0');

  if (elapsed>6 && !hintFaded) { hintEl.style.opacity='0'; hintFaded=true; }
  waveSpeed = 18 + elapsed*0.015;

  // Lean
  leanSmooth += (leanTarget-leanSmooth)*0.07;

  // Surfer height on wave face — lean left = go up the face, right = drop down
  surferFaceVY += (-4 + -leanSmooth*12)*dt;
  surferFaceVY *= 0.92;
  surferFaceY  += surferFaceVY*dt;
  if (surferFaceY>8)  { surferFaceY=8;  surferFaceVY*=-0.3; }
  if (surferFaceY<0.3){ surferFaceY=0.3; surferFaceVY*=-0.3; }

  const sx = leanSmooth*1.5;
  const sy = surferFaceY*0.28;
  const bob = Math.sin(elapsed*1.8)*0.04 + Math.sin(elapsed*2.9)*0.02;

  surferGroup.position.set(sx, sy+bob+0.03, 0);
  surferGroup.rotation.z = leanSmooth*0.22;
  surferGroup.rotation.x = -surferFaceVY*0.03+0.05;
  arms.rotation.z = leanSmooth*0.35;
  headM.rotation.y = leanSmooth*0.2;

  // Ocean waves
  const oPos=oceanGeo.attributes.position.array;
  for (let i=0;i<oPos.length;i+=3) {
    const ox=oceanBase[i], oz=oceanBase[i+2];
    oPos[i+1]=Math.sin(ox*0.08+elapsed*1.1)*0.5+Math.sin(oz*0.05+elapsed*0.8)*0.8+Math.sin(ox*0.15-oz*0.07+elapsed*1.4)*0.3;
  }
  oceanGeo.attributes.position.needsUpdate=true;
  oceanGeo.computeVertexNormals();

  // Wave face ripple
  const wPos=waveGeo.attributes.position.array;
  for (let i=0;i<wPos.length;i+=3) {
    const oz=waveBase[i+2];
    wPos[i+1]=waveBase[i+1]+Math.sin(oz*0.12+elapsed*2.2)*0.35+Math.sin(oz*0.07-elapsed*1.5)*0.2;
  }
  waveGeo.attributes.position.needsUpdate=true;
  waveGeo.computeVertexNormals();

  // Lip
  lipMesh.rotation.y = Math.sin(elapsed*0.9)*0.18;
  lipMesh.position.y = 22+Math.sin(elapsed*1.1)*0.9;

  // Camera follows surfer height
  camera.position.x += ((sx*0.3)-camera.position.x)*0.05;
  camera.position.y += ((2.5+sy*0.6)-camera.position.y)*0.04;
  camera.position.y += Math.sin(elapsed*1.8)*0.06;
  camera.rotation.z += (-leanSmooth*0.04-camera.rotation.z)*0.08;
  camera.lookAt(new THREE.Vector3(sx*0.5-4, sy*0.3, -25));

  // Rim light pulse
  rimLight.intensity=1.5+Math.sin(elapsed*0.7)*0.5;
  rimLight.position.y=8+Math.sin(elapsed*1.1)*2;

  // Foam trail
  const fPos=foamGeo.attributes.position.array;
  for (let i=0;i<foamCount;i++) {
    foamLife[i]-=dt*0.9;
    if(foamLife[i]<=0){resetFoam(i,sx);continue;}
    fPos[i*3]+=foamVel[i*3]; fPos[i*3+1]+=foamVel[i*3+1]; fPos[i*3+2]+=foamVel[i*3+2];
  }
  foamGeo.attributes.position.needsUpdate=true;
  foamMat.opacity=0.5+Math.abs(leanSmooth)*0.3;

  // Spray
  const sPos=sprayGeo.attributes.position.array;
  for (let i=0;i<sprayCount;i++) {
    sprayLife[i]-=dt*0.5;
    if(sprayLife[i]<=0){resetSpray(i);continue;}
    sPos[i*3]+=sprayVel[i*3]; sPos[i*3+1]+=sprayVel[i*3+1]-dt*0.05; sPos[i*3+2]+=sprayVel[i*3+2];
  }
  sprayGeo.attributes.position.needsUpdate=true;

  // Colour shift with time
  const dp=(Math.sin(elapsed*0.015)+1)*0.5;
  oceanMat.color.setRGB(0+dp*0.05, 0.45+dp*0.1, 0.6+dp*0.15);
  waveMat.color.setRGB(0, 0.55+dp*0.1, 0.75+dp*0.1);

  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
